<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - 360D.AI</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: __gtStandardL_53dfc7, system-ui, helvetica, arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .coming-soon-container {
            max-width: 600px;
            padding: 4rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 3rem;
            line-height: 1.5;
        }

        .back-btn {
            background: linear-gradient(135deg, #0066CC, #0052a3);
            color: white;
            padding: 1rem 2rem;
            border-radius: 3rem;
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(24, 119, 242, 0.4);
        }

        .logo {
            height: 40px;
            margin-bottom: 2rem;
            object-fit: contain;
        }
    </style>
</head>

<body>
    <div class="coming-soon-container">
        <img src="assets/e01c6d5a26dac546cc06e775dab738a3.png" alt="360D.AI" class="logo">
        <h1>About Us</h1>
        <p>This is the About Us page. We are continuously building our platform. Check back soon for our full story.</p>
        <a href="index.html" class="back-btn">Return Home</a>
    </div>
</body>

</html>
